name: Oracle Reward Payout

on:
  schedule:
    # Runs daily at 20:05 UTC (5 min after lottery draw)
    - cron: '5 20 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run (no transactions)'
        required: false
        default: 'false'

jobs:
  payout:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated questions.json

    steps:
      - name: Checkout repo
        uses: actions/actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @cosmjs/proto-signing @cosmjs/stargate

      - name: Run payout script
        env:
          ORACLE_MNEMONIC: ${{ secrets.ORACLE_MNEMONIC }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node oracle-payout.js

      - name: Commit updated questions.json
        run: |
          git config user.name  "oracle-bot"
          git config user.email "oracle-bot@terraoracle.app"
          git add questions.json
          git diff --staged --quiet || git commit -m "chore: payout run $(date -u +'%Y-%m-%d')"
          git push
